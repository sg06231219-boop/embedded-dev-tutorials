<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宓屽叆寮忓紑鍙戞暀绋?/title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--br:#30363d;--t:#c9d1d9;--t2:#8b949e;--a:#58a6ff;--g:#3fb950;--o:#d2991d;--r:#f85149;--p:#a371f7;--c1:#39c5cf;--sidebar-w:280px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);display:flex;min-height:100vh}

/* === 渚ц竟鏍?=== */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--br);overflow-y:auto;z-index:100;transition:transform .3s;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid var(--br);flex-shrink:0}
.sidebar-header h1{font-size:1.1em;background:linear-gradient(135deg,var(--a),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px}
.sidebar-header p{font-size:.72em;color:var(--t2)}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{margin-bottom:4px}
.nav-group-title{padding:8px 16px;font-size:.72em;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.nav-group.collapsible .nav-group-title{cursor:pointer;user-select:none}
.nav-group.collapsible .toggle-icon{float:right;transition:transform .2s}
.nav-group.collapsible.open .toggle-icon{transform:rotate(90deg)}
.nav-group.collapsible .nav-item{display:none}
.nav-group.collapsible.open .nav-item{display:block}
.nav-item{display:block;padding:6px 16px 6px 24px;font-size:.85em;color:var(--t2);text-decoration:none;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--t);background:var(--bg3);border-left-color:var(--a)}
.nav-item.active{color:var(--a);background:rgba(88,166,255,.08);border-left-color:var(--a);font-weight:600}
.nav-item .badge{display:inline-block;font-size:.65em;padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
.badge-new{background:rgba(63,185,80,.15);color:var(--g)}
.badge-hot{background:rgba(248,81,73,.15);color:var(--r)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--br);font-size:.7em;color:var(--t2);flex-shrink:0}

/* === 涓诲唴瀹瑰尯 === */
.main{margin-left:var(--sidebar-w);flex:1;min-width:0}
.topbar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--br);padding:10px 20px;display:flex;align-items:center;gap:12px}
.topbar .menu-btn{display:none;background:none;border:1px solid var(--br);color:var(--t);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:1.1em}
.topbar .breadcrumb{font-size:.85em;color:var(--t2)}
.topbar .breadcrumb a{color:var(--a);text-decoration:none}
.topbar .search-box{margin-left:auto;position:relative}
.topbar .search-box input{background:var(--bg3);border:1px solid var(--br);color:var(--t);padding:6px 12px 6px 32px;border-radius:6px;font-size:.85em;width:200px;outline:none;transition:border-color .2s}
.topbar .search-box input:focus{border-color:var(--a)}
.topbar .search-box .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:.85em}

/* === 鍐呭 === */
.content{max-width:900px;margin:0 auto;padding:24px 28px 60px}
.content h1{font-size:1.6em;text-align:center;padding:20px 0;background:linear-gradient(135deg,var(--a),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.content h2{font-size:1.25em;color:var(--a);margin:32px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--br)}
.content h3{font-size:1.08em;color:var(--c1);margin:22px 0 8px}
.content h4{font-size:.98em;color:var(--o);margin:16px 0 6px}
.content p{margin:8px 0;line-height:1.9}
.content pre{background:#1c2128;border:1px solid var(--br);border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;font-size:.84em;line-height:1.6;position:relative}
.content pre code{color:#e6edf3;font-family:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace}
.content code{font-family:'SF Mono','Fira Code',monospace;font-size:.9em}
.content :not(pre)>code{background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--c1)}
.content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.88em}
.content th{background:var(--bg3);color:var(--a);padding:8px 12px;text-align:left;border:1px solid var(--br)}
.content td{padding:8px 12px;border:1px solid var(--br)}
.content tr:nth-child(even){background:var(--bg2)}
.content .note,.content .tip,.content .warn,.content .analogy{border-radius:8px;padding:12px 16px;margin:12px 0;font-size:.88em}
.content .note{background:rgba(88,166,255,.08);border-left:3px solid var(--a)}
.content .warn{background:rgba(248,81,73,.08);border-left:3px solid var(--r)}
.content .tip{background:rgba(63,185,80,.08);border-left:3px solid var(--g)}
.content .analogy{background:rgba(163,113,247,.08);border-left:3px solid var(--p)}
.content .step{background:var(--bg2);border:1px solid var(--br);border-radius:8px;padding:10px 14px;margin:8px 0}
.content .card{background:var(--bg2);border:1px solid var(--br);border-radius:10px;margin:14px 0;overflow:hidden}
.content .card .h{background:var(--bg3);padding:10px 14px;display:flex;align-items:center;gap:8px}
.content .card .name{font-weight:600;flex:1}
.content .card .b{padding:12px 14px}
.content .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.72em;font-weight:600}
.content .tag.g{background:rgba(63,185,80,.15);color:var(--g)}.content .tag.b{background:rgba(88,166,255,.15);color:var(--a)}
.content .tag.o{background:rgba(210,153,29,.15);color:var(--o)}.content .tag.r{background:rgba(248,81,73,.15);color:var(--r)}.content .tag.p{background:rgba(163,113,247,.15);color:var(--p)}
.content a{color:var(--a);text-decoration:none}
.content a:hover{text-decoration:underline}
.content img{max-width:100%;border-radius:8px;margin:8px 0}

/* === 棣栭〉 === */
.home-hero{text-align:center;padding:40px 20px 30px}
.home-hero h1{font-size:2em;margin-bottom:8px}
.home-hero p{color:var(--t2);font-size:1.05em;max-width:600px;margin:0 auto}
.home-section-title{font-size:1.15em;color:var(--a);margin:28px 0 10px;padding-left:4px;border-left:3px solid var(--a);padding-bottom:2px}
.page-nav{display:flex;justify-content:space-between;margin:32px 0 16px;padding:14px 0;border-top:1px solid var(--br);gap:12px}
.page-nav a{color:var(--a);cursor:pointer;font-size:.9em;padding:8px 14px;border-radius:8px;background:var(--bg2);text-decoration:none;transition:background .2s}
.page-nav a:hover{background:var(--bg3)}
.page-nav-prev{margin-right:auto}
.page-nav-next{margin-left:auto}
.home-stats{display:flex;gap:16px;justify-content:center;margin:24px 0;flex-wrap:wrap}
.home-stat{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:16px 24px;text-align:center;min-width:120px}
.home-stat .num{font-size:1.8em;font-weight:700;background:linear-gradient(135deg,var(--a),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-stat .label{font-size:.75em;color:var(--t2);margin-top:2px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin:20px 0}
.home-card{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:18px;cursor:pointer;transition:all .25s;text-decoration:none;display:block;color:var(--t)}
.home-card:hover{border-color:var(--a);transform:translateY(-2px);box-shadow:0 4px 20px rgba(88,166,255,.1)}
.home-card .icon{font-size:1.8em;margin-bottom:8px}
.home-card .title{font-size:1.05em;font-weight:700;color:var(--a);margin-bottom:4px}
.home-card .desc{font-size:.82em;color:var(--t2);line-height:1.6}
.home-card .tags{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap}
.home-card .size{font-size:.7em;color:var(--t2);margin-top:6px}

/* === 鐩綍TOC === */
.toc-float{position:fixed;right:20px;top:60px;width:200px;max-height:70vh;overflow-y:auto;font-size:.78em;border-left:2px solid var(--br);padding-left:12px;z-index:40}
.toc-float a{display:block;color:var(--t2);text-decoration:none;padding:3px 0;line-height:1.5;transition:color .15s}
.toc-float a:hover,.toc-float a.active{color:var(--a)}

/* === 澶嶅埗鎸夐挳 === */
.copy-btn{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--br);color:var(--t2);padding:3px 8px;border-radius:4px;font-size:.72em;cursor:pointer;opacity:0;transition:opacity .2s}
pre:hover .copy-btn{opacity:1}
.copy-btn.copied{color:var(--g);border-color:var(--g)}

/* === 绉诲姩绔?=== */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .topbar .menu-btn{display:block}
  .toc-float{display:none}
  .content{padding:16px 14px 40px}
}
@media(max-width:600px){
  .home-grid{grid-template-columns:1fr}
  .topbar .search-box{display:none}
}

/* === 鍔犺浇鍔ㄧ敾 === */
.loading{display:flex;justify-content:center;padding:40px}
.loading .spinner{width:32px;height:32px;border:3px solid var(--br);border-top-color:var(--a);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* === 鍥炲埌椤堕儴 === */
.back-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;background:var(--bg2);border:1px solid var(--br);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:1.1em;z-index:90;opacity:0;transition:all .3s;pointer-events:none}
.back-top.show{opacity:1;pointer-events:auto}
.back-top:hover{color:var(--a);border-color:var(--a)}

/* 杩涘害鏉?*/
.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--a);z-index:200;transition:width .15s;width:0}

/* === v1.5.0 鏂板鏍峰紡 === */
/* 瀛︿範璺嚎鍥?*/
.roadmap{background:var(--bg2);border:1px solid var(--br);border-radius:14px;padding:20px 24px;margin:20px 0}
.roadmap h3{color:var(--a);margin-bottom:14px;font-size:1.1em}
.roadmap-steps{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.roadmap-step{background:var(--bg3);border:1px solid var(--br);border-radius:8px;padding:8px 14px;font-size:.82em;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--t);display:flex;align-items:center;gap:6px}
.roadmap-step:hover{border-color:var(--a);transform:translateY(-1px)}
.roadmap-step .step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75em;flex-shrink:0}
.roadmap-step.s1 .step-num{background:rgba(63,185,80,.2);color:var(--g)}
.roadmap-step.s2 .step-num{background:rgba(88,166,255,.2);color:var(--a)}
.roadmap-step.s3 .step-num{background:rgba(210,153,29,.2);color:var(--o)}
.roadmap-step.s4 .step-num{background:rgba(248,81,73,.2);color:var(--r)}
.roadmap-arrow{color:var(--t2);font-size:1.2em}

/* 闅惧害鎸囩ず鍣?*/
.difficulty{display:flex;gap:3px;align-items:center;margin-top:6px}
.difficulty .dot{width:8px;height:8px;border-radius:50%;background:var(--br)}
.difficulty .dot.on{background:var(--g)}
.difficulty.d2 .dot.on{background:var(--a)}
.difficulty.d3 .dot.on{background:var(--o)}
.difficulty.d4 .dot.on{background:var(--r)}

/* 棣栭〉hero鍔ㄧ敾 */
.home-hero h1{animation:heroFadeIn .8s ease-out}
@keyframes heroFadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.quick-start{animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(35,134,54,.4)}50%{box-shadow:0 0 0 10px rgba(35,134,54,0)}}

/* 娣辫壊妯″紡鍒囨崲锛堥鐣欙級 */
.theme-toggle{background:none;border:1px solid var(--br);color:var(--t2);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:.85em;transition:all .2s}
.theme-toggle:hover{color:var(--a);border-color:var(--a)}

/* 鏁欑▼鍐匱OC */
.toc-inline{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:14px 18px;margin:16px 0}
.toc-inline summary{cursor:pointer;color:var(--a);font-weight:600;font-size:.92em;user-select:none}
.toc-inline ol{padding-left:20px;margin-top:8px}
.toc-inline li{margin:4px 0;font-size:.85em}
.toc-inline li a{color:var(--t2);text-decoration:none;transition:color .15s}
.toc-inline li a:hover{color:var(--a)}

/* 閿洏蹇嵎閿彁绀?*/
.kbd{background:var(--bg3);border:1px solid var(--br);border-radius:4px;padding:1px 6px;font-size:.75em;font-family:monospace;color:var(--t2)}

/* 杩斿洖棣栭〉鎸夐挳 */
.home-fab{position:fixed;bottom:24px;left:calc(var(--sidebar-w) + 16px);width:40px;height:40px;background:var(--bg2);border:1px solid var(--br);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:1em;z-index:90;opacity:0;transition:all .3s;pointer-events:none}
.home-fab.show{opacity:1;pointer-events:auto}
.home-fab:hover{color:var(--a);border-color:var(--a)}
@media(max-width:900px){.home-fab{left:16px}}

/* 缁熻鍗＄墖鍔ㄧ敾 */
.home-stat{transition:transform .2s}
.home-stat:hover{transform:translateY(-2px)}

/* 鎼滅储澧炲己 */
.search-results-count{color:var(--t2);font-size:.85em;margin-bottom:12px}
.search-highlight{background:rgba(88,166,255,.25);padding:1px 3px;border-radius:3px}

/* 鈺愨晲 v1.5.1 鏂板: 鏀惰棌澶?& 杩涘害 鈺愨晲 */
.bookmark-btn{background:none;border:none;font-size:1.2em;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s;opacity:.4;vertical-align:middle}
.bookmark-btn:hover{opacity:1;transform:scale(1.2)}
.bookmark-btn.active{opacity:1}
.bookmarks-section{margin-top:8px;border-top:1px solid var(--br);padding-top:8px}
.bookmarks-title{font-size:.72em;color:var(--t2);padding:6px 16px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.bookmarks-count{font-size:.75em;background:var(--bg3);padding:1px 6px;border-radius:8px}
.bm-item{display:block;padding:5px 16px 5px 24px;font-size:.8em;color:var(--t2);text-decoration:none;cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative}
.bm-item:hover{color:var(--t);background:var(--bg3);border-left-color:var(--g)}
.bm-item .bm-remove{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.7em;opacity:0;transition:opacity .15s;cursor:pointer;color:var(--r)}
.bm-item:hover .bm-remove{opacity:1}
.read-time{font-size:.75em;color:var(--t2);margin-left:4px}
.progress-indicator{display:inline-flex;align-items:center;gap:4px;font-size:.7em;color:var(--t2)}
.progress-indicator .pi-bar{width:40px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-indicator .pi-fill{height:100%;background:var(--g);border-radius:2px;transition:width .3s}
.sort-bar{display:flex;gap:6px;margin:14px 0 8px;flex-wrap:wrap;align-items:center}
.sort-bar span.label{font-size:.8em;color:var(--t2)}
.sort-btn{padding:4px 10px;border:1px solid var(--br);border-radius:6px;font-size:.78em;cursor:pointer;background:var(--bg2);color:var(--t2);transition:all .15s}
.sort-btn:hover,.sort-btn.active{border-color:var(--a);color:var(--a);background:var(--bg3)}

/* 鈺愨晲 楠ㄦ灦灞?鈺愨晲 */
.skeleton-wrap{padding:24px 28px}
.skeleton-line{height:14px;background:var(--bg2);border-radius:6px;margin:10px 0;position:relative;overflow:hidden}
.skeleton-line.title{height:28px;width:55%;margin:20px 0 16px}
.skeleton-line.h2{height:22px;width:40%;margin:24px 0 10px}
.skeleton-line.p{width:90%}
.skeleton-line.p2{width:75%}
.skeleton-line.p3{width:82%}
.skeleton-line.short{width:50%}
.skeleton-card{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:18px;margin:14px 0;overflow:hidden;position:relative}
.skeleton-card .sk-icon{width:36px;height:36px;border-radius:8px;background:var(--bg3)}
.skeleton-card .sk-title{height:16px;width:60%;margin:10px 0 6px;background:var(--bg3);border-radius:4px}
.skeleton-card .sk-text{height:12px;width:85%;background:var(--bg3);border-radius:4px;margin:6px 0}
.skeleton-card .sk-text2{height:12px;width:65%;background:var(--bg3);border-radius:4px;margin:6px 0}
.skeleton-line::after,.skeleton-card::after{content:'';position:absolute;top:0;left:-150px;width:150px;height:100%;background:linear-gradient(90deg,transparent,rgba(88,166,255,.06),transparent);animation:shimmer 1.6s infinite}
@keyframes shimmer{to{left:100%}}
@media(prefers-reduced-motion:reduce){.skeleton-line::after,.skeleton-card::after{animation:none}}

/* 鈺愨晲 浜壊妯″紡 鈺愨晲 */
body.light-mode{--bg:#f5f7fa;--bg2:#eef1f6;--bg3:#e4e8ef;--br:#d1d5db;--t:#1a202c;--t2:#4a5568;--a:#3b82f6;--g:#16a34a;--o:#d97706;--r:#dc2626;--p:#7c3aed;--c1:#0891b2}
body.light-mode .sidebar{background:#fff;border-right-color:#e5e7eb}
body.light-mode .topbar{background:#fff;border-bottom-color:#e5e7eb}
body.light-mode pre{background:#f1f5f9;border-color:#e2e8f0}
body.light-mode .home-card{background:#fff;border-color:#e5e7eb}
body.light-mode .home-card:hover{border-color:var(--a);box-shadow:0 4px 20px rgba(59,130,246,.08)}
body.light-mode .home-stat{background:#fff;border-color:#e5e7eb}
body.light-mode .skeleton-line,body.light-mode .skeleton-card{background:#e8ebf0}
body.light-mode .skeleton-card .sk-icon,body.light-mode .skeleton-card .sk-title,body.light-mode .skeleton-card .sk-text,body.light-mode .skeleton-card .sk-text2{background:#dde1e8}

/* 鈺愨晲 v1.6.3: 涓撴敞闃呰妯″紡 鈺愨晲 */
body.focus-mode .sidebar{transform:translateX(-100%)}
body.focus-mode .main{margin-left:0!important}
body.focus-mode .content{max-width:820px!important;margin:0 auto!important;padding:20px 32px 80px!important}
body.focus-mode .topbar .focus-indicator{display:inline-block;font-size:.75em;color:var(--p);padding:2px 8px;border:1px solid var(--p);border-radius:4px;margin-left:8px}
.focus-btn{padding:4px 10px;border:1px solid var(--br);border-radius:6px;font-size:.78em;cursor:pointer;background:var(--bg2);color:var(--t2);transition:all .15s}
.focus-btn:hover{border-color:var(--p);color:var(--p)}
.focus-btn.active{border-color:var(--p);color:var(--p);background:rgba(163,113,247,.1)}

/* 鈺愨晲 v1.6.3: 鎵撳嵃鏍峰紡 鈺愨晲 */
@media print{
  .sidebar,.topbar,.progress-bar,.page-nav,.chnav,.copy-btn{display:none!important}
  .main{margin-left:0!important}
  body{background:#fff!important;color:#000!important;font-size:11pt}
  .content{max-width:100%!important;padding:0!important}
  .content h1{color:#000!important;-webkit-text-fill-color:#000!important;background:none!important}
  .content h2{color:#333!important;border-bottom:1px solid #ccc!important}
  .content h3{color:#555!important}
  pre{background:#f5f5f5!important;border:1px solid #ddd!important;color:#333!important;page-break-inside:avoid}
  pre code{color:#333!important}
  .home-card,.home-stat{border:1px solid #ddd!important;page-break-inside:avoid}
  a{color:#000!important;text-decoration:underline}
  .note,.warn,.tip,.analogy,.trouble{border:1px solid #ddd!important;page-break-inside:avoid}
}

/* 鈺愨晲 v1.6.3: 绔犺妭杩涘害鎸囩ず鍣?鈺愨晲 */

// === 鍏ㄦ枃鎼滅储缂撳瓨 ===
let searchCache = {};
let searchIndexReady = false;

async function buildSearchIndex() {
  if (searchIndexReady) return;
  const pages = Object.entries(PAGES).filter(([id, cfg]) => id !== 'home' && cfg.file);
  const promises = pages.map(async ([id, cfg]) => {
    try {
      const resp = await fetch(cfg.file);
      if (!resp.ok) return;
      const text = await resp.text();
      const plain = text.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '').replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '').replace(/<[^>]+>/g, ' ').replace(/&[a-z]+;/gi, ' ').replace(/\s+/g, ' ').toLowerCase();
      searchCache[id] = plain;
    } catch(e) {}
  });
  await Promise.all(promises);
  searchIndexReady = true;
}

setTimeout(buildSearchIndex, 2500);

// === 鎼滅储 ===
async function handleSearch(query) {
  if (!query.trim()) {
    if (searchMode) loadPage(currentPage);
    return;
  }
  searchMode = true;
  const content = document.getElementById('contentArea');
  content.innerHTML = skeletonContent();

  if (!searchIndexReady) await buildSearchIndex();

  const q = query.toLowerCase();
  const results = [];
  Object.entries(PAGES).forEach(([id, cfg]) => {
    if (id === 'home') return;
    const card = cardsData.find(c => c.page === id);
    const desc = card ? card.desc.toLowerCase() : '';
    const metaText = cfg.title.toLowerCase() + ' ' + cfg.breadcrumb.toLowerCase() + ' ' + desc;
    let matchLevel = 0;
    if (metaText.includes(q)) matchLevel = 1;
    const fullText = searchCache[id] || '';
    if (fullText.includes(q)) matchLevel = Math.max(matchLevel, 2);
    if (matchLevel > 0) {
      let snippet = '';
      if (matchLevel >= 2 && fullText) {
        const idx = fullText.indexOf(q);
        const start = Math.max(0, idx - 30);
        const end = Math.min(fullText.length, idx + q.length + 60);
        snippet = (start > 0 ? '鈥? : '') + fullText.slice(start, end).trim() + (end < fullText.length ? '鈥? : '');
      }
      results.push({ id, title: cfg.title, desc: card ? card.desc : '', card, matchLevel, snippet });
    }
  });
  results.sort((a,b) => b.matchLevel - a.matchLevel);

  let html = `<h2>馃攳 鎼滅储缁撴灉: "${query}"</h2><div class="search-results-count">鎵惧埌 ${results.length} 涓尮閰嶆暀绋嬶紙鍏ㄦ枃鎼滅储锛?/div>`;
  if (results.length === 0) {
    html += '<p style="color:var(--t2)">鏈壘鍒板尮閰嶇殑鏁欑▼锛岃瘯璇曞叾浠栧叧閿瘝銆?/p><p style="color:var(--t2);font-size:.85em">鎻愮ず锛氬彲鎼滄暀绋嬫爣棰樸€佹弿杩版垨鍏ㄦ枃鍐呭锛屽"PWM""HAL_Delay""瀹氭椂鍣?</p>';
  } else {
    results.forEach(r => {
      const diffHtml = r.card && r.card.diff ? `<div class="difficulty d${r.card.diff}">${'<span class="dot on"></span>'.repeat(r.card.diff)+'<span class="dot"></span>'.repeat(4-r.card.diff)}</div>` : '';
      const tags = r.card ? r.card.tags.map((t,i) => `<span class="tag ${i===0?'g':'b'}">${t}</span>`).join('') : '';
      const matchBadge = r.matchLevel === 2 ? '<span class="tag g" style="margin-left:4px">鍏ㄦ枃鍖归厤</span>' : '<span class="tag b" style="margin-left:4px">鏍囬鍖归厤</span>';
      const snippetHtml = r.snippet ? `<div style="font-size:.78em;color:var(--t2);margin-top:4px;padding:6px 10px;background:var(--bg3);border-radius:6px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.snippet.replace(q, '<b style="background:rgba(88,166,255,.25);padding:1px 3px;border-radius:3px">'+q+'</b>')}</div>` : '';
      html += `<div class="card" style="cursor:pointer" onclick="loadPage('${r.id}')"><div class="b"><strong style="color:var(--a)">${r.title}</strong>${matchBadge}${r.desc ? '<br><span style="color:var(--t2);font-size:.85em">'+r.desc+'</span>' : ''}${diffHtml}${snippetHtml}<div style="margin-top:6px">${tags}</div></div></div>`;
    });
  }
  content.innerHTML = html;
}

}

function toggleBookmark(pageId) {
  const bm = getBookmarks();
  const idx = bm.indexOf(pageId);
  if (idx >= 0) bm.splice(idx, 1);
  else bm.push(pageId);
  saveBookmarks(bm);
  updateBookmarkUI();
  renderBookmarksList();
}
function isBookmarked(pageId) { return getBookmarks().includes(pageId); }
function updateBookmarkUI() {
  const btn = document.getElementById('bmToggle');
  if (!btn) return;
  if (isBookmarked(currentPage)) { btn.classList.add('active'); btn.textContent = '猸?; }
  else { btn.classList.remove('active'); btn.textContent = '鈽?; }
}
function renderBookmarksList() {
  const bm = getBookmarks();
  const section = document.getElementById('bookmarksSection');
  const list = document.getElementById('bookmarkList');
  const countEl = document.getElementById('bmCount');
  if (bm.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  countEl.textContent = bm.length;
  let html = '';
  bm.forEach(id => {
    const cfg = PAGES[id];
    if (cfg) html += `<div class="bm-item" onclick="loadPage('${id}')">${cfg.title}<span class="bm-remove" onclick="event.stopPropagation();removeBookmark('${id}')">鉁?/span></div>`;
  });
  list.innerHTML = html;
}
function removeBookmark(pageId) {
  const bm = getBookmarks().filter(id => id !== pageId);
  saveBookmarks(bm);
  renderBookmarksList();
  updateBookmarkUI();
}

// === 瀛︿範杩涘害 ===
function markViewed(pageId) {
  if (pageId === 'home') return;
  try {
    const viewed = JSON.parse(localStorage.getItem('tutorial_viewed')||'{}');
    viewed[pageId] = new Date().toISOString();
    localStorage.setItem('tutorial_viewed', JSON.stringify(viewed));
  } catch(e) {}
}
function getViewedCount() {
  try { return Object.keys(JSON.parse(localStorage.getItem('tutorial_viewed')||'{}')).length; }
  catch(e) { return 0; }
}
function getProgressPercent() {
  const total = Object.keys(PAGES).length - 1; // exclude home
  return Math.round((getViewedCount() / total) * 100);
}
function progressIndicator() {
  const pct = getProgressPercent();
  return pct > 0 ? `<div class="progress-indicator" title="宸茶 ${pct}%"><div class="pi-bar"><div class="pi-fill" style="width:${pct}%"></div></div>${pct}%</div>` : '';
}
function updateHomeStats() {
  const viewed = getViewedCount();
  const progressHtml = progressIndicator();
  // Update stats if on home page
  const statsDiv = document.querySelector('.home-stats');
  if (statsDiv) {
    const existing = statsDiv.querySelector('.home-stat.progress-stat');
    if (!existing && viewed > 0) {
      const statEl = document.createElement('div');
      statEl.className = 'home-stat progress-stat';
      statEl.innerHTML = `<div class="num">${viewed}</div><div class="label">宸插涔?/div><div class="progress-indicator" style="margin-top:4px"><div class="pi-bar"><div class="pi-fill" style="width:${getProgressPercent()}%"></div></div>${getProgressPercent()}%</div>`;
      statsDiv.appendChild(statEl);
    } else if (existing && viewed > 0) {
      existing.querySelector('.num').textContent = viewed;
      existing.querySelector('.pi-fill').style.width = getProgressPercent()+'%';
      existing.querySelector('.progress-indicator').childNodes[2].textContent = getProgressPercent()+'%';
    }
  }
}

  const hash = window.location.hash;
  if (hash && hash.startsWith('#/')) {
    const page = hash.slice(2);
    if (PAGES[page]) { loadPage(page); return; }

  loadPage('home');
  renderBookmarksList();
  updateHomeStats();
