<h3>DHT11椹卞姩浠ｇ爜</h3>

<pre><code>// dht11.h
#ifndef DHT11_H
#define DHT11_H
#include "stm32f1xx_hal.h"

typedef struct {
    uint8_t humidity_int;    // 婀垮害鏁存暟閮ㄥ垎
    uint8_t humidity_dec;    // 婀垮害灏忔暟閮ㄥ垎
    uint8_t temp_int;        // 娓╁害鏁存暟閮ㄥ垎
    uint8_t temp_dec;        // 娓╁害灏忔暟閮ㄥ垎
} DHT11_Data_t;

#endif</code></pre>

<pre><code>// dht11.c
#include "dht11.h"

static void delay_us(uint32_t us) {
    uint32_t ticks = us * (SystemCoreClock / 1000000) / 5;
    while (ticks--);
}

uint8_t DHT11_Read(DHT11_Data_t *data, GPIO_TypeDef *port, uint16_t pin) {
    uint8_t buf[5] = {0};
    GPIO_InitTypeDef GPIO_InitStruct = {0};

    // 涓绘満鍙戦€佽捣濮嬩俊鍙凤紙鎷変綆18ms锛?    GPIO_InitStruct.Pin = pin;
    GPIO_InitStruct.Mode = GPIO_MODE_OUTPUT_PP;
    GPIO_InitStruct.Speed = GPIO_SPEED_FREQ_HIGH;
    HAL_GPIO_Init(port, &amp;GPIO_InitStruct);
    HAL_GPIO_WritePin(port, pin, GPIO_PIN_RESET);
    HAL_Delay(18);
    HAL_GPIO_WritePin(port, pin, GPIO_PIN_SET);
    delay_us(30);

    // 鍒囨崲涓鸿緭鍏?    GPIO_InitStruct.Mode = GPIO_MODE_INPUT;
    GPIO_InitStruct.Pull = GPIO_PULLUP;
    HAL_GPIO_Init(port, &amp;GPIO_InitStruct);

    // 绛夊緟DHT11鍝嶅簲
    uint32_t timeout = 100;
    while (HAL_GPIO_ReadPin(port, pin) &amp;&amp; timeout--) delay_us(1);
    if (timeout == 0) return 1;  // 鏃犲搷搴?
    // 鎺ユ敹40浣嶆暟鎹?    for (int i = 0; i &lt; 5; i++) {
        for (int j = 0; j &lt; 8; j++) {
            timeout = 100;
            while (!HAL_GPIO_ReadPin(port, pin) &amp;&amp; timeout--) delay_us(1);
            delay_us(40);
            if (HAL_GPIO_ReadPin(port, pin)) {
                buf[i] |= (1 &lt;&lt; (7 - j));
                timeout = 100;
                while (HAL_GPIO_ReadPin(port, pin) &amp;&amp; timeout--) delay_us(1);
            }
        }
    }

    // 鏍￠獙
    if (buf[4] != (uint8_t)(buf[0] + buf[1] + buf[2] + buf[3]))
        return 2;  // 鏍￠獙澶辫触

    data->humidity_int = buf[0];
    data->humidity_dec = buf[1];
    data->temp_int     = buf[2];
    data->temp_dec     = buf[3];
    return 0;  // 鎴愬姛
}</code></pre>

int main(void) {
    HAL_Init();
    SystemClock_Config();
    MX_GPIO_Init();

    printf("
=== Environment Monitor ===
");

    while (1) {
        uint8_t ret = DHT11_Read(&amp;dht, GPIOA, GPIO_PIN_1);

            printf("Temp: %d.%d C, Humi: %d.%d %%\n",
                dht.temp_int, dht.temp_dec,

}</code></pre>

// 棰勬祴锛歺 = x, P = P + Q
// 鏇存柊锛欿 = P/(P+R), x = x + K*(z-x), P = (1-K)*P

typedef struct {

    float R;  // 娴嬮噺鍣０锛堣皟灏忊啋鏇翠俊浠讳紶鎰熷櫒锛?} Kalman1D;

float kalman_update(Kalman1D* k, float measurement) {
    // 棰勬祴
    k->P = k->P + k->Q;
    // 鏇存柊

}
