<h3>Linker Script (STM32F103C8T6)</h3>

<pre><code>/* STM32F103C8Tx.ld - 瀹屾暣鐗?*/
ENTRY(Reset_Handler)

}

SECTIONS {

  } > FLASH

  .ARM.extab : { *(.ARM.extab* .gnu.linkonce.armextab.*) } > FLASH
  .ARM : {
    __exidx_start = .;
    *(.ARM.exidx*)
    __exidx_end = .;
  } > FLASH

  .data : {
    . = ALIGN(4);
    _sdata = .;
    *(.data)
    *(.data*)
    . = ALIGN(4);
    _edata = .;
  } > RAM AT > FLASH

  .bss : {
    . = ALIGN(4);
    _sbss = .;
    __bss_start__ = _sbss;
    *(.bss)
    *(.bss*)
    *(COMMON)
    . = ALIGN(4);

  /DISCARD/ : { *(.ARM.attributes) }
}</code></pre>
