<h1>з»—?з»”зӢ…зҙ°ESP32еҜ®вӮ¬йҚҷжҲқз–„йҺҙ?/h1>

<h3>ESP-IDF йҚ©иҷ№о”…й”ӣе қз•јйҸӮз‘°зҙ‘йҚҷжҲһо”ӢйҸӢи®№зҙҡ</h3>

<strong>WindowsзҖ№еӨҺо—Ҡе§қгғ©оҖғй”ӣ?/strong><br>
йҲ¶?ж¶“е¬ӯжөҮз»ӮиҚӨеҡҺзҖ№еӨҺо—ҠйҚ–е’ғзҙ°<a href="https://dl.espressif.com/dl/esp-idf/" style="color:var(--a)">dl.espressif.com/dl/esp-idf/</a>й”ӣе ҹеё№й‘Ҫж„¶зҙқйҚ–е‘ӯжғҲйҺөвӮ¬йҸҲеӨүз··з’§ж өзҙҡ<br>
йҲ¶?йҚҷеұҪеҡ®зҖ№еӨҺо—Ҡй”ӣеІ„вӮ¬еӨӢе«ЁжҰӣжЁҝо…»з’әоҲҡз·һ <code>C:\Espressif</code>й”ӣеұҪе¬Җй–«?еЁЈиҜІе§һйҚ’зҷҷATH"<br>
йҲ¶?зҖ№еӨҺо—Ҡз»ҫп№Ӯжё¶10-20йҚ’е—ӣжҢ“й”ӣеұҪеҪҮйҚҗе……з°¬зјғжҲҰвӮ¬?br>
йҲ¶?зҖ№еӨҺо—ҠзҖ№еұҫеһҡйҚҡеәҜзҙқйҺөж’ізҙ‘"ESP-IDF 5.x CMD"и№ҮоӮЈеөҺйҸӮз‘°зҙЎй”ӣе қз•Ёз‘Ғе‘ӯж«’йҚ’ж¶ҳзј“йҗЁеӢ¶зҙҡ<br>
йҲ¶?жҘ еІғзҳүй”ӣ?code>idf.py --version</code> йҲ«?жқҲж’іеҡӯйҗ—е ҹж№°йҚҷеі°еөҶйҺҙж„¬е§ӣ<br><br>
<strong>жҝЎеӮӣзҒүз»ӮиҚӨеҡҺйҚ–е‘¬з¬…жқһиҠҘеҸғй”ӣ?/strong><br>
йҲҘ?йҗўг„ҰеўңйҸҲиҷ№е„№йҗҗзЎ…зҳҜз’ҮжӣӘзҙҷйҸҲеӨӢжӨӮе§Јж“¶iFiи№ҮоӮ¬зҙҡ<br>
йҲҘ?йҚҰг„Ұж№ҒVPNйҗЁеӢӯе№Ҷжҫ§еҶ§з¬…жқһи—үжӮ—йҺ·з–ҜзӨүжқ©еӣЁжҪө<br>
йҲҘ?йҗўвү’latformIOйҺ»жҺҚж¬ўй”ӣеңҙS Codeй–ІеІғо—Ҡжөңе—ӯзҙҡйҚ’ж¶ҳзј“ESP32жӨӨеңӯжҙ°й”ӣеұҫжЈӨй—ҮвӮ¬йҚ—жӣ е«ӯз‘ҒеҢӣSP-IDF</div>

<pre><code>// WiFiйҺөоӮЈејҝз»ҖиҪ°з·Ҙ
#include "esp_wifi.h"
#include "esp_event.h"

void wifi_scan(void) {
    wifi_scan_config_t scan_config = {
        .ssid = NULL,
        .bssid = NULL,
        .channel = 0,
        .show_hidden = true
    };

    esp_wifi_set_mode(WIFI_MODE_STA);
    esp_wifi_start();
    esp_wifi_scan_start(&amp;scan_config, true);  // й—ғиҜІо”ЈйҺөоӮЈејҝ

    uint16_t ap_count = 0;
    esp_wifi_scan_get_ap_num(&amp;ap_count);

    wifi_ap_record_t *ap_list = malloc(sizeof(wifi_ap_record_t) * ap_count);
    esp_wifi_scan_get_ap_records(&amp;ap_count, ap_list);

    for (int i = 0; i &lt; ap_count; i++) {
        printf("%-32s RSSI: %d Ch: %d
",
            ap_list[i].ssid, ap_list[i].rssi, ap_list[i].primary);
    }
    free(ap_list);
}</code></pre>

<h3>WiFiжқ©зӮҙеёҙ</h3>

<pre><code>// жқ©зӮҙеёҙWiFi
void wifi_connect(const char *ssid, const char *password) {
    wifi_config_t wifi_config = {0};
    strncpy((char *)wifi_config.sta.ssid, ssid, 31);
    strncpy((char *)wifi_config.sta.password, password, 63);

    esp_wifi_set_mode(WIFI_MODE_STA);
    esp_wifi_set_config(WIFI_IF_STA, &amp;wifi_config);

<pre><code>// ESP32 LEDй—ӮоҒҶе„Ҡ + ж¶“жҸ’еҪӣжқҲж’іеҡӯй”ӣең“rduinoеҰ—е—ҳзҒҰй”ӣ?йҚ’е—ӣжҢ“з’әжҲҰвӮ¬ж°ҫзҙҡ

void setup() {
    Serial.begin(115200);  // йҚ’жҝҶоқҗйҚ–ж ҰиҰҶйҚҷ?    pinMode(2, OUTPUT);     // GPIO2з’ҒеҸҘиҙҹжқҲж’іеҡӯ

}

  btn.textContent = 'Copy';
  btn.onclick = () => {
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
  };
  pre.appendChild(btn);
});
</script>

<h2>йҰғж‘ұ WiFiеҜ®вӮ¬йҚҷжҲқз–„йҺҙ?/h2>

<p>ESP32йҗЁеӢ¬зүіи№ҮеҶ§зҙӯйҚ”жҢҺж§ёйҚҷеұҫДҒWiFi+й’ғжҝҲеў®йҠҶеӮқз№–ж¶“вӮ¬й‘әеӮҷзІ й—Ҷи·әзҙ‘жҝ®е¬«еёүйҺ»о“қiFiзјӮж «в–јйҠҶ?/p>

<h3>WiFi StationеҰҜвҖізҙЎй”ӣе Јз№ӣйҺәгғЁзҹҫйҗўеҚһж«’й”ӣ?/h3>

<pre><code>#include "esp_wifi.h"
#include "esp_event.h"
#include "nvs_flash.h"

#define WIFI_SSID "YourWiFi"
#define WIFI_PASS "YourPassword"

static void wifi_event_handler(void* arg, esp_event_base_t base,
    int32_t id, void* data) {
    if (base == WIFI_EVENT && id == WIFI_EVENT_STA_START)
        esp_wifi_connect();
    else if (base == IP_EVENT && id == IP_EVENT_STA_GOT_IP) {
        ip_event_got_ip_t* ev = (ip_event_got_ip_t*)data;
        printf("Got IP: " IPSTR "\n", IP2STR(&ev->ip_info.ip));
    }
}

void wifi_init_sta(void) {
    nvs_flash_init();
    esp_netif_init();
    esp_event_loop_create_default();
    esp_netif_create_default_wifi_sta();
    
    wifi_init_config_t cfg = WIFI_INIT_CONFIG_DEFAULT();
    esp_wifi_init(&cfg);
    
    esp_event_handler_register(WIFI_EVENT, ESP_EVENT_ANY_ID,
        &wifi_event_handler, NULL);
    esp_event_handler_register(IP_EVENT, IP_EVENT_STA_GOT_IP,
        &wifi_event_handler, NULL);
    
    wifi_config_t wifi_cfg = {
        .sta = {.ssim = WIFI_SSID, .password = WIFI_PASS}
    };
    esp_wifi_set_mode(WIFI_MODE_STA);
    esp_wifi_set_config(WIFI_IF_STA, &wifi_cfg);
    esp_wifi_start();
}</code></pre>

<h3>HTTPзҖ№гҲЎеҹӣз»”оҲӨзҙҷGETз’Үй”Ӣзң°й”ӣ?/h3>

<pre><code>#include "esp_http_client.h"

void http_get_example(void) {
    esp_http_client_config_t cfg = {
        .url = "http://api.openweathermap.org/data/2.5/weather?q=Beijing",
        .method = HTTP_METHOD_GET,
        .timeout_ms = 5000,
    };
    esp_http_client_handle_t client = esp_http_client_init(&cfg);
    esp_err_t err = esp_http_client_perform(client);
    
    if (err == ESP_OK) {
        int status = esp_http_client_get_status_code(client);
        int len = esp_http_client_get_content_length(client);
        printf("HTTP %d, Response: %d bytes\n", status, len);
        // з’ҮиҜІеҪҮйҚқе¶…з°ІжөЈ?        char buf[512];
        int read = esp_http_client_read(client, buf, sizeof(buf)-1);
        buf[read] = 0;
        printf("%s\n", buf);
    }
    esp_http_client_cleanup(client);
}</code></pre>
