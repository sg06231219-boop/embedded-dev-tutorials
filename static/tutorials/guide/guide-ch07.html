<h2>馃寪 MQTT鐗╄仈缃戦€氫俊</h2>

<p>MQTT鏄疘oT棰嗗煙鐨凥TTP鈥斺€旀墍鏈変簯骞冲彴閮芥敮鎸佸畠銆傛瘮HTTP杞?00鍊嶏紝閫傚悎MCU銆?/p>

<pre><code>#include "mqtt_client.h"

static esp_mqtt_client_handle_t mqtt_client;

static void mqtt_event_handler(void* arg, esp_event_base_t base,
    int32_t id, void* event_data) {
    esp_mqtt_event_handle_t ev = event_data;
    switch (ev->event_id) {
    case MQTT_EVENT_CONNECTED:
        ESP_LOGI("MQTT", "宸茶繛鎺?");
        // 璁㈤槄涓婚
        esp_mqtt_client_subscribe(mqtt_client, "device/cmd", 1);
        // 鍙戝竷涓婄嚎娑堟伅
        esp_mqtt_client_publish(mqtt_client, "device/status", 
            "online", 0, 1, 0);
        break;
    
    case MQTT_EVENT_DATA:
        ESP_LOGI("MQTT", "鏀跺埌: topic=%.*s data=%.*s",
            ev->topic_len, ev->topic,
            ev->data_len, ev->data);
        // 澶勭悊浜戠涓嬪彂鐨勫懡浠?        if (strncmp(ev->data, "reboot", ev->data_len) == 0) {
            esp_restart();
        }
        break;
    
    case MQTT_EVENT_DISCONNECTED:
        ESP_LOGW("MQTT", "鏂紑杩炴帴锛岃嚜鍔ㄩ噸杩炰腑...");
        break;
    }
}

void mqtt_init(void) {
    esp_mqtt_client_config_t cfg = {
        .broker.address.uri = "mqtt://broker.emqx.io:1883",  // 鍏嶈垂娴嬭瘯MQTT Broker
        .credentials = {
            .username = "esp32-device-01",
            .client_id = "esp32-sensor-001"
        }
    };
    mqtt_client = esp_mqtt_client_init(&cfg);
    esp_mqtt_client_register_event(mqtt_client, ESP_EVENT_ANY_ID,
        mqtt_event_handler, NULL);
    esp_mqtt_client_start(mqtt_client);
}

// 瀹氭椂涓婃姤鏁版嵁
void publish_sensor_data(float temp, float hum) {
    char payload[128];
    snprintf(payload, sizeof(payload),
        "{\"temp\":%.1f,\"hum\":%.1f,\"ts\":%lld}",
        temp, hum, esp_timer_get_time());
    // QoS 1 = 鑷冲皯涓€娆￠€佽揪
    esp_mqtt_client_publish(mqtt_client, "sensor/data",
        payload, 0, 1, 0);
}</code></pre>

<h3>WiFi Station妯″紡锛堣繛鎺ヨ矾鐢卞櫒锛?/h3>

<pre><code>#include "esp_wifi.h"
#include "esp_event.h"
#include "nvs_flash.h"

#define WIFI_SSID "YourWiFi"
#define WIFI_PASS "YourPassword"

static void wifi_event_handler(void* arg, esp_event_base_t base,
    int32_t id, void* data) {
    if (base == WIFI_EVENT && id == WIFI_EVENT_STA_START)
        esp_wifi_connect();
    else if (base == IP_EVENT && id == IP_EVENT_STA_GOT_IP) {
        ip_event_got_ip_t* ev = (ip_event_got_ip_t*)data;
        printf("Got IP: " IPSTR "\n", IP2STR(&ev->ip_info.ip));

}

void wifi_init_sta(void) {
    nvs_flash_init();
    esp_netif_init();
    esp_event_loop_create_default();
    esp_netif_create_default_wifi_sta();
    
    wifi_init_config_t cfg = WIFI_INIT_CONFIG_DEFAULT();
    esp_wifi_init(&cfg);
    
    esp_event_handler_register(WIFI_EVENT, ESP_EVENT_ANY_ID,
        &wifi_event_handler, NULL);
    esp_event_handler_register(IP_EVENT, IP_EVENT_STA_GOT_IP,
        &wifi_event_handler, NULL);
    
    wifi_config_t wifi_cfg = {
        .sta = {.ssim = WIFI_SSID, .password = WIFI_PASS}
    };
    esp_wifi_set_mode(WIFI_MODE_STA);
    esp_wifi_set_config(WIFI_IF_STA, &wifi_cfg);
    esp_wifi_start();
}</code></pre>
