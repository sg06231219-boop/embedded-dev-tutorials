(function(){
  var letters = [];
  TERMS.forEach(function(t){
    var l = t.name.charAt(0).toUpperCase();
    if (letters.indexOf(l) < 0) letters.push(l);
  });
  var nav = document.getElementById('glossaryNav');
  nav.innerHTML = '<a class="active" onclick="showAll()" id="nav-all">All</a>' + letters.map(function(l){
    return '<a onclick="filterByLetter(\'' + l + '\')" id="nav-' + l + '">' + l + '</a>';
  }).join('');

  // Render all terms
  renderTerms(TERMS);
})();

function renderTerms(terms) {
  var html = '';
  var lastLetter = '';
  terms.forEach(function(t) {
    var l = t.name.charAt(0);
    if (l !== lastLetter) {
      html += '<h2 id="sec-' + l + '" style="color:var(--a,#58a6ff);border-bottom:1px solid var(--br,#30363d);padding-bottom:4px;margin:28px 0 12px">' + l + '</h2>';
      lastLetter = l;
    }
    html += '<div class="term-block" id="term-' + t.name.replace(/\s+/g,'-').replace(/[^\w-]/g,'') + '">';
    html += '<div class="term-name">' + t.name + '<span class="term-en">' + t.en + '</span><span class="term-cat">' + t.cat + '</span></div>';
    html += '<div class="term-def">' + t.def + '</div>';
    html += '</div>';
  });
  document.getElementById('glossaryContent').innerHTML = html || '<p style="color:var(--t2,#8b949e)">鏈壘鍒板尮閰嶇殑鏈銆?/p>';
}

function filterTerms() {
  var q = document.getElementById('glossarySearch').value.toLowerCase().trim();
  if (!q) { renderTerms(TERMS); resetNavActive(); document.getElementById('nav-all').classList.add('active'); return; }
  var filtered = TERMS.filter(function(t){
    return t.name.toLowerCase().indexOf(q) >= 0 || t.en.toLowerCase().indexOf(q) >= 0 || t.def.toLowerCase().indexOf(q) >= 0 || t.cat.toLowerCase().indexOf(q) >= 0;
  });
  renderTerms(filtered);
  resetNavActive();
}

function filterByLetter(l) {
  document.getElementById('glossarySearch').value = '';
  var filtered = TERMS.filter(function(t){ return t.name.toUpperCase().startsWith(l); });
  renderTerms(filtered);
  resetNavActive();
  document.getElementById('nav-' + l).classList.add('active');
}

function showAll() {
  document.getElementById('glossarySearch').value = '';
  renderTerms(TERMS);
  resetNavActive();
  document.getElementById('nav-all').classList.add('active');
}

function resetNavActive() {
  document.querySelectorAll('#glossaryNav a').forEach(function(a){ a.classList.remove('active'); });
}
</script>
</body>
</html>
